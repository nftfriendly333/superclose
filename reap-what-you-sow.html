<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reap What You Sow — $PvE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0a0a0f;color:#e8e6f0;}

/* ── NAV ── */
#site-nav{position:sticky;top:0;z-index:9000;background:#0a0a0f;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:48px;font-family:'DM Mono',monospace;gap:12px;}
#site-nav .sn-logo{font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:#e8e6f0;text-decoration:none;white-space:nowrap;flex-shrink:0;}
#site-nav .sn-logo span{color:#c8a96e;font-style:italic;}
#site-nav .sn-links{display:flex;align-items:center;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;}
#site-nav .sn-links::-webkit-scrollbar{display:none;}
#site-nav .sn-links a{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:6px;text-decoration:none;color:#6b6880;border:1px solid transparent;white-space:nowrap;transition:all 0.18s;}
#site-nav .sn-links a:hover{color:#e8e6f0;border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);}
#site-nav .sn-links a.sn-active{color:#e8e6f0;border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);}
#site-nav .sn-links a.sn-arena.sn-active{color:#e06c6c;border-color:rgba(224,108,108,0.3);background:rgba(224,108,108,0.07);}
#site-nav .sn-links a.sn-reap.sn-active{color:#c8a96e;border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.07);}
#site-nav .sn-links a.sn-trade.sn-active{color:#7faaff;border-color:rgba(127,170,255,0.3);background:rgba(127,170,255,0.07);}
#site-nav .sn-links a.sn-dashboard.sn-active{color:#5cb85c;border-color:rgba(92,184,92,0.3);background:rgba(92,184,92,0.07);}

/* ── PAGE ── */
.page{min-height:calc(100vh - 48px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px 20px;font-family:'Space Mono',monospace;}

/* ── TAPE ── */
.tape{width:100%;max-width:600px;height:38px;background:repeating-linear-gradient(-45deg,#f0c040 0px,#f0c040 20px,#1a1220 20px,#1a1220 40px);border-top:2px solid #c9a830;border-bottom:2px solid #c9a830;border-radius:2px;}

/* ── SIGN ── */
.sign-board{background:#f0c040;border:4px solid #c9a830;border-radius:6px;padding:22px 40px;text-align:center;box-shadow:7px 7px 0px #7a5c1e;position:relative;max-width:480px;width:100%;}
.sign-board::before,.sign-board::after{content:'';position:absolute;top:-15px;width:13px;height:13px;background:#7a5c1e;border-radius:50%;border:2px solid #c9a830;}
.sign-board::before{left:22px;}
.sign-board::after{right:22px;}
.sign-title{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#1a1a2e;letter-spacing:5px;line-height:1;margin-bottom:6px;}
.sign-sub{font-size:10px;color:#3a2e10;letter-spacing:2px;text-transform:uppercase;}

/* ── GIF ── */
.gif-frame{width:240px;height:170px;border:3px solid #c9a830;border-radius:6px;overflow:hidden;background:#1a1220;flex-shrink:0;}
.gif-frame img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── MSG ── */
.msg{font-size:11px;color:#6b6880;letter-spacing:2px;text-transform:uppercase;text-align:center;}
</style>
</head>
<body>

<nav id="site-nav">
  <a class="sn-logo" href="index.html">PvE <span>Hub</span></a>
  <div class="sn-links">
    <a href="index.html" class="sn-home">Home</a>
    <a href="iron-arenav10.html" class="sn-arena">⚔ Iron Arena</a>
    <a href="reap-what-you-sow.html" class="sn-reap sn-active">🌾 Reap What You Sow</a>
    <a href="trade-together2.html" class="sn-trade">📊 Trade Together</a>
    <a href="dashboard.html" class="sn-dashboard">◈ Dashboard</a>
  </div>
</nav>

<div class="page">
  <div class="tape"></div>

  <div class="sign-board">
    <div class="sign-title">Under Construction</div>
    <div class="sign-sub">Reap What You Sow — coming soon</div>
  </div>

  <div class="gif-frame">
    <img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif" alt="under construction" />
  </div>

  <div class="msg">Something good is growing here — check back soon</div>

  <div class="tape"></div>
</div>

</body>
</html>
